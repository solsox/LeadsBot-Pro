# docker-compose.yml
version: "3.9"

services:

  # ── Base de datos ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: leadagent_db
    environment:
      POSTGRES_DB:       leadagent
      POSTGRES_USER:     leadagent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadagent"]
      interval: 10s
      retries: 5

  # ── Cache / Cola de tareas ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: leadagent_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── API FastAPI ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leadagent_api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://leadagent:${DB_PASSWORD:-secret}@postgres:5432/leadagent
      REDIS_URL:    redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Worker Celery ────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leadagent_worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://leadagent:${DB_PASSWORD:-secret}@postgres:5432/leadagent
      REDIS_URL:    redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: python worker.py

  # ── Celery Beat (cron) ───────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leadagent_beat
    env_file: .env
    environment:
      DATABASE_URL: postgresql://leadagent:${DB_PASSWORD:-secret}@postgres:5432/leadagent
      REDIS_URL:    redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: celery -A tasks beat --loglevel=info

  # ── Frontend Next.js ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leadagent_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data: